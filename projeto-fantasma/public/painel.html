<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA FANTASMA | Painel</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0e17;
            --panel-bg: rgba(16, 23, 40, 0.75);
            --accent-green: #00ff88;
            --accent-cyan: #00d4ff;
            --accent-red: #ff3366;
            --text-main: #f0f4f8;
            --text-muted: #8c9baf;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 212, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(0, 255, 136, 0.08) 0%, transparent 50%);
            overflow-x: hidden;
        }

        /* HEADER */
        header {
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            background: rgba(10, 14, 23, 0.9);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: 1px;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .pulse-dot {
            width: 10px;
            height: 10px;
            background-color: var(--accent-green);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-green);
            animation: pulse 1.5s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.7; }
            100% { transform: scale(1.4); opacity: 1; }
        }

        .stats-header {
            display: flex;
            gap: 2rem;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .stat-val {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--accent-cyan);
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* MAIN CONTENT */
        main {
            padding: 2rem;
            flex: 1;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
        }

        .glass-panel {
            background: var(--panel-bg);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            height: fit-content;
        }

        /* ALVOS CARDS */
        .alvos-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
        }

        .alvo-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 12px;
            padding: 1.25rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            animation: slideUp 0.4s ease-out forwards;
        }

        .alvo-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.15);
            border-color: rgba(0, 212, 255, 0.5);
        }

        .alvo-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: linear-gradient(to bottom, var(--accent-cyan), var(--accent-green));
        }

        .match-teams {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .match-details {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
        }

        .match-time {
            background: rgba(255,51,102,0.1);
            color: var(--accent-red);
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 800;
        }

        .match-odd {
            font-size: 1.1rem;
            color: var(--accent-green);
            font-weight: 600;
        }

        .radar-stats {
            margin-top: 1rem;
            padding-top: 0.75rem;
            border-top: 1px dashed rgba(255,255,255,0.1);
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
        }

        .signal-tag {
            display: inline-block;
            margin-top: 0.5rem;
            padding: 0.3rem 0.6rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 800;
            color: white;
            text-transform: uppercase;
        }

        .signal-OVER {
            background: linear-gradient(45deg, #ff3366, #ff7b00);
            box-shadow: 0 0 10px rgba(255,51,102,0.3);
        }

        .signal-UNDER {
            background: linear-gradient(45deg, #00d4ff, #0066ff);
            box-shadow: 0 0 10px rgba(0,212,255,0.3);
        }

        /* LOG FEED */
        .log-feed {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            max-height: 600px;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        /* Custom Scrollbar */
        .log-feed::-webkit-scrollbar { width: 6px; }
        .log-feed::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 10px; }
        .log-feed::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        
        .log-item {
            background: rgba(0,0,0,0.2);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            border-left: 3px solid rgba(255,255,255,0.1);
            animation: fadeIn 0.3s ease-out forwards;
        }

        .log-item.armada {
            border-left-color: var(--accent-green);
        }

        .log-item.varredura {
            border-left-color: var(--text-muted);
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* EMPTY STATE */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }
        .empty-state svg { width: 48px; height: 48px; opacity: 0.5; }

    </style>
</head>
<body>

    <header>
        <div class="brand">
            <div class="pulse-dot" id="connectionDot"></div>
            SISTEMA FANTASMA
        </div>
        <div class="stats-header">
            <div class="stat-item">
                <span class="stat-val" id="valTotalJogos">0</span>
                <span class="stat-label">Jogos na Varredura</span>
            </div>
            <div class="stat-item">
                <span class="stat-val" id="valAlvos">0</span>
                <span class="stat-label">Alvos Armados</span>
            </div>
        </div>
    </header>

    <main>
        <section class="glass-panel">
            <h2 class="section-title">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></svg>
                Radar de Alvos Ativos
            </h2>
            <div class="alvos-container" id="alvosGrid">
                <div class="empty-state" id="emptyState">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" /></svg>
                    <span>Nenhum alvo detectado no momento. Aguardando padrões...</span>
                </div>
            </div>
        </section>

        <section class="glass-panel">
            <h2 class="section-title">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                Terminal de Operações
            </h2>
            <div class="log-feed" id="logFeed">
                <!-- Logs aparecerão aqui -->
            </div>
        </section>
    </main>

    <script>
        // DOM Elements
        const alvosGrid = document.getElementById('alvosGrid');
        const emptyState = document.getElementById('emptyState');
        const logFeed = document.getElementById('logFeed');
        const valTotalJogos = document.getElementById('valTotalJogos');
        const valAlvos = document.getElementById('valAlvos');
        const connectionDot = document.getElementById('connectionDot');

        let alvosCount = 0;

        function addLog(msg, type = 'normal') {
            const el = document.createElement('div');
            el.className = `log-item ${type}`;
            const time = new Date().toLocaleTimeString('pt-BR');
            el.innerHTML = `<strong>[${time}]</strong> ${msg}`;
            logFeed.prepend(el);
            
            // Keep max 50 logs
            if(logFeed.children.length > 50) {
                logFeed.lastChild.remove();
            }
        }

        function createAlvoCard(data) {
            emptyState.style.display = 'none';
            alvosCount++;
            valAlvos.innerText = alvosCount;

            const card = document.createElement('div');
            card.className = 'alvo-card';
            const signalClass = data.sinal.includes('OVER') ? 'signal-OVER' : 'signal-UNDER';

            card.innerHTML = `
                <div class="match-teams">${data.mandante} <br><span style="font-size:0.9rem; color:var(--text-muted)">vs</span><br> ${data.visitante}</div>
                <div class="signal-tag ${signalClass}">${data.sinal}</div>
                <div style="font-size:0.75rem; color:var(--text-muted); margin-top:0.25rem;">${data.dica}</div>
                
                <div class="match-details">
                    <span class="match-time">${data.tempo}</span>
                    <span class="match-odd">Cantos: ${data.odd}<br><span style="font-size:0.8rem; color:white">Gols: ${data.oddGols}</span></span>
                </div>
                <div class="radar-stats">
                    ${data.radar}
                </div>
            `;
            alvosGrid.prepend(card);
        }

        // Connect to WebSocket
        function connectWS() {
            const wc = new WebSocket('ws://' + window.location.host);

            wc.onopen = () => {
                connectionDot.style.backgroundColor = 'var(--accent-green)';
                addLog('Conexão estabelecida com a Central Fantasma.', 'normal');
            };

            wc.onclose = () => {
                connectionDot.style.backgroundColor = 'var(--accent-red)';
                addLog('Conexão perdida. Tentando reconectar em 5s...', 'normal');
                setTimeout(connectWS, 5000);
            };

            wc.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    
                    if (msg.type === 'status_varredura') {
                        valTotalJogos.innerText = msg.data.totalJogos || 0;
                        addLog(`Varredura da Plataforma Live concluída. Jogos ativos: ${msg.data.totalJogos}`, 'varredura');
                    } 
                    else if (msg.type === 'alvo_encontrado') {
                        createAlvoCard(msg.data);
                        addLog(`Alvo travado: ${msg.data.mandante} x ${msg.data.visitante}`, 'armada');
                    }
                    else if (msg.type === 'aposta_armada') {
                        addLog(`Aposta simulada armadilha ativada para: ${msg.data.jogo}`, 'armada');
                    }
                } catch(e) {
                    console.error("Erro processando msg:", e);
                }
            };
        }

        // Formatação inicial
        addLog('Iniciando terminal receptor...', 'varredura');
        connectWS();

    </script>
</body>
</html>
