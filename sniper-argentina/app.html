function pPMF(k,l){if(l<=0)return k===0?1:0;let r=-l+k*Math.log(l);for(let i=1;i<=k;i++)r-=Math.log(i);return Math.exp(r);}
function pSample(l){const L=Math.exp(-l);let k=0,p=1;do{k++;p*=Math.random();}while(p>L);return k-1;}
function buildPD(){
  const t={};let tH=0,tA=0,n=0;
  ALL.forEach(([,home,gH,gV,away])=>{
    [home,away].forEach(nm=>{if(!t[nm])t[nm]={hG:0,hGC:0,hN:0,aG:0,aGC:0,aN:0};});
    t[home].hG+=gH;t[home].hGC+=gV;t[home].hN++;
    t[away].aG+=gV;t[away].aGC+=gH;t[away].aN++;
    tH+=gH;tA+=gV;n++;
  });
  const avgH=tH/(n||1),avgA=tA/(n||1),s={};
  Object.entries(t).forEach(([nm,v])=>{
    const hN=v.hN||1,aN=v.aN||1;
    s[nm]={attH:(v.hG/hN)/avgH,defH:(v.hGC/hN)/avgA,attA:(v.aG/aN)/avgA,defA:(v.aGC/aN)/avgH};
  });
  return{s,avgH,avgA};
}
// Calcula fator de ajuste por forma recente (últimos 5 jogos com peso temporal)
function formFactor(teamName, isHome){
  const st=STATS.find(t=>t.name===teamName);
  if(!st||!st.hist||st.hist.length<3)return 1.0;
  const recentes=st.hist.slice(-5);
  // Pesos crescentes para jogos mais recentes
  const pesos=[0.08,0.12,0.17,0.25,0.38];
  let score=0;
  recentes.forEach((h,i)=>{
    const pw=pesos[i+(5-recentes.length)];
    if(h.r==='V')score+=pw*1.12;
    else if(h.r==='E')score+=pw*0.95;
    else score+=pw*0.82;
  });
  // score ~0.82–1.12; centraliza em 1.0
  return Math.max(0.80,Math.min(1.20,score));
}

// Calcula fator H2H (confrontos diretos recentes)
function h2hFactor(home, away){
  const matches=ALL.filter(m=>(m[1]===home&&m[4]===away)||(m[1]===away&&m[4]===home)).slice(-6);
  if(matches.length<2)return{fH:1.0,fA:1.0};
  let wH=0,wA=0,tot=matches.length;
  matches.forEach(m=>{
    if(m[1]===home){if(m[2]>m[3])wH++;else if(m[3]>m[2])wA++;}
    else{if(m[3]>m[2])wH++;else if(m[2]>m[3])wA++;}
  });
  // Fator sutil: máximo ±8% de ajuste por H2H
  const fH=1+(wH/tot-0.4)*0.20;
  const fA=1+(wA/tot-0.4)*0.20;
  return{fH:Math.max(0.90,Math.min(1.10,fH)),fA:Math.max(0.90,Math.min(1.10,fA))};
}

// Compressão conservadora: evita overconfidence em resultados
// Liga argentina é muito equilibrada — cap realista em ~68%
function calibrarProb(win,draw,loss){
  // Sigmoid suave: comprime extremos, mantém centro
  const compress=(p)=>{
    if(p>0.65) return 0.65+(p-0.65)*0.35; // acima de 65% → freia forte
    if(p<0.12) return 0.12+(p-0.12)*0.50; // abaixo de 12% → levanta piso
    return p;
  };
  let w=compress(win), d=compress(draw), l=compress(loss);
  // Renormalizar para somar 1.0
  const tot=w+d+l;
  return{win:w/tot, draw:d/tot, loss:l/tot};
}

function project(home,away){
  const{s,avgH,avgA}=PD;
  if(!s[home]||!s[away])return null;
  // Lambda base Poisson
  const lH_base=Math.max(.1,s[home].attH*s[away].defA*avgH);
  const lA_base=Math.max(.1,s[away].attA*s[home].defH*avgA);
  // Ajuste por forma recente + H2H
  const ffH=formFactor(home,true), ffA=formFactor(away,false);
  const h2h=h2hFactor(home,away);
  const lH=Math.max(.1,lH_base*(0.65+0.25*ffH+0.10*h2h.fH));
  const lA=Math.max(.1,lA_base*(0.65+0.25*ffA+0.10*h2h.fA));
  const MAX=7;
  const mx=[];for(let i=0;i<=MAX;i++){mx[i]=[];for(let j=0;j<=MAX;j++)mx[i][j]=pPMF(i,lH)*pPMF(j,lA);}
  let winR=0,drawR=0,lossR=0,o15=0,o25=0,o35=0,btts=0,ahH=0,ahA=0;const sc=[];
  for(let i=0;i<=MAX;i++)for(let j=0;j<=MAX;j++){
    const p=mx[i][j];
    if(i>j)winR+=p;else if(i===j)drawR+=p;else lossR+=p;
    if(i+j>1.5)o15+=p;if(i+j>2.5)o25+=p;if(i+j>3.5)o35+=p;
    if(i>0&&j>0)btts+=p;if(i>j)ahH+=p;if(i>=j)ahA+=p;
    sc.push({s:`${i}x${j}`,p});
  }
  sc.sort((a,b)=>b.p-a.p);
  // Calibração: comprimir probabilidades 1X2 para evitar overconfidence
  const cal=calibrarProb(winR,drawR,lossR);
  return{lH,lA,win:cal.win,draw:cal.draw,loss:cal.loss,winRaw:winR,drawRaw:drawR,lossRaw:lossR,o15,o25,o35,btts,ahH,ahA,top5:sc.slice(0,5),mx};
}

const W5=[.08,.12,.17,.25,.38];
function buildStats(){
  const T={};
  const e=n=>{if(!T[n])T[n]={name:n,P:0,W:0,D:0,L:0,GF:0,GA:0,hP:0,hW:0,hD:0,hL:0,hGF:0,hGA:0,aP:0,aW:0,aD:0,aL:0,aGF:0,aGA:0,o15:0,o25:0,o35:0,btts:0,clean:0,hist:[]};};
  ALL.forEach(([rod,home,gH,gV,away])=>{
    e(home);e(away);
    const rH=gH>gV?"V":gH===gV?"E":"D",rA=gV>gH?"V":gH===gV?"E":"D",tot=gH+gV;
    [home,away].forEach(nm=>{T[nm].P++;T[nm].o15+=tot>1.5?1:0;T[nm].o25+=tot>2.5?1:0;T[nm].o35+=tot>3.5?1:0;T[nm].btts+=(gH>0&&gV>0)?1:0;});
    T[home].GF+=gH;T[home].GA+=gV;T[home].hP++;T[home].hGF+=gH;T[home].hGA+=gV;
    T[away].GF+=gV;T[away].GA+=gH;T[away].aP++;T[away].aGF+=gV;T[away].aGA+=gH;
    if(gH>gV){T[home].W++;T[home].hW++;T[away].L++;T[away].aL++;}
    else if(gH===gV){T[home].D++;T[home].hD++;T[away].D++;T[away].aD++;}
    else{T[home].L++;T[home].hL++;T[away].W++;T[away].aW++;}
    if(gV===0)T[home].clean++;if(gH===0)T[away].clean++;
    T[home].hist.push({r:rH,gf:gH,ga:gV,opp:away,rod,h:true});
    T[away].hist.push({r:rA,gf:gV,ga:gH,opp:home,rod,h:false});
  });
  return Object.values(T).map(t=>{
    const l5=t.hist.slice(-5);
    const mom=l5.reduce((a,h,i)=>a+(h.r==="V"?3*W5[i]:h.r==="E"?W5[i]:0),0)/3*100;
    const sniper=Math.round((t.P?t.W/t.P*100:0)*.30+mom*.35+Math.max(0,Math.min(100,50+((t.GF-t.GA)/Math.max(t.P,1))*20))*.20+(t.hP?t.hW/t.hP*100:0)*.15);
    let unb=0;for(let i=t.hist.length-1;i>=0&&t.hist[i].r!=="D";i--)unb++;
    let wst=0;for(let i=t.hist.length-1;i>=0&&t.hist[i].r==="V";i--)wst++;
    let scs=0;for(let i=t.hist.length-1;i>=0&&t.hist[i].gf>0;i--)scs++;
    let noW=0;for(let i=t.hist.length-1;i>=0&&t.hist[i].r!=="V";i--)noW++;
    return{...t,Pts:t.W*3+t.D,GD:t.GF-t.GA,form:l5.map(h=>h.r).join(""),mom:Math.round(mom),sniper,unb,wst,scs,noW,
      avgGF:t.P?(t.GF/t.P).toFixed(2):"0.00",avgGA:t.P?(t.GA/t.P).toFixed(2):"0.00",avgTot:t.P?((t.GF+t.GA)/t.P).toFixed(2):"0.00",
      pO15:t.P?Math.round(t.o15/t.P*100):0,pO25:t.P?Math.round(t.o25/t.P*100):0,pO35:t.P?Math.round(t.o35/t.P*100):0,
      pBTTS:t.P?Math.round(t.btts/t.P*100):0,pCS:t.P?Math.round(t.clean/t.P*100):0};
  });
}

    {nome:'Over 1.5 Gols',prob:proj.o15,tipo:'gol'},
    {nome:'Over 2.5 Gols',prob:proj.o25,tipo:'gol'},
    {nome:'Over 3.5 Gols',prob:proj.o35,tipo:'gol'},
    {nome:'Under 2.5 Gols',prob:1-proj.o25,tipo:'gol'},
    {nome:'BTTS - Ambas Marcam',prob:proj.btts,tipo:'gol'},
    {nome:'BTTS - Nao Ambas',prob:1-proj.btts,tipo:'gol'},
    {nome:'AH -0.5 ('+home+')',prob:proj.ahH,tipo:'res'},
    {nome:'AH +0.5 ('+away+')',prob:proj.ahA,tipo:'res'},
  ];
  return mkts.filter(m=>m.prob>=0.42).sort((a,b)=>b.prob-a.prob).slice(0,5).map(m=>{
    const nc=nivelConf(m.prob,m.tipo);
    return{...m,oddFair:(1/m.prob),conf:nc.conf,cor:nc.cor,bg:nc.bg};
  });
}

function verificarMercado(nome,gH,gA){
  if(nome.includes('Vitória Mandante'))return gH>gA;
  if(nome.includes('Empate'))return gH===gA;
  if(nome.includes('Vitória Visitante'))return gA>gH;
  if(nome.includes('Over 1.5'))return gH+gA>1.5;
  if(nome.includes('Over 2.5'))return gH+gA>2.5;
  if(nome.includes('Over 3.5'))return gH+gA>3.5;
  if(nome.includes('Under 2.5'))return gH+gA<=2.5;
  if(nome.includes('BTTS - Ambas'))return gH>0&&gA>0;
  if(nome.includes('BTTS - Nao'))return gH===0||gA===0;
  if(nome.includes('AH -0.5'))return gH>gA;
  if(nome.includes('AH +0.5'))return gA>=gH;
  return false;
}

// OS 3 TIROS DO SNIPER — Mercados padrão de análise
// Tiro 1: Resultado (1X2) · Tiro 2: Asian O/U 2 · Tiro 3: BTTS
// ═══════════════════════════════════════════════════════════

function calcAsianO2(proj){
  // Calcula probabilidades Asian Handicap Over/Under 2 gols
  // Over 2 = 3+ gols → ganhou | Under 2 = 0 ou 1 gol → ganhou | Push = exatamente 2 gols → devolve
  if(!proj||!proj.mx)return{over2:0,under2:0,push2:0};
  let over2=0,under2=0,push2=0;
  const mx=proj.mx;
  for(let i=0;i<mx.length;i++){for(let j=0;j<mx[i].length;j++){
    const tot=i+j,p=mx[i][j];
    if(tot>=3)over2+=p;else if(tot===2)push2+=p;else under2+=p;
  }}
  return{over2,under2,push2};
}

// Converte conf string para CSS class seguro
function confClass(conf){
  const map={'CERTEZA':'certeza','ALTA':'alta','MÉDIA':'media','BAIXA':'baixa','RISCO':'risco',
             'ALTO':'alta','MÉDIO':'media','BAIXO':'baixa'};
  return map[conf]||(conf||'baixa').toLowerCase().replace(/[^a-z]/g,'');
}

// Sistema de 5 níveis de confiança (recalibrado pós análise Rodada 12)
function nivelConf(prob, tipo){
  // tipo: 'res' (resultado 1x2) | 'gol' (goals/btts)
  if(tipo==='res'){
    if(prob>=0.70)return{conf:'CERTEZA', cor:'#22d3ee', bg:'#0c4a6e'};
    if(prob>=0.60)return{conf:'ALTA',    cor:'#4ade80', bg:'#14532d'};
    if(prob>=0.50)return{conf:'MÉDIA',   cor:'#fbbf24', bg:'#713f12'};
    if(prob>=0.42)return{conf:'BAIXA',   cor:'#fb923c', bg:'#7c2d12'};
    return                {conf:'RISCO',  cor:'#f87171', bg:'#7f1d1d'};
  } else {
    if(prob>=0.68)return{conf:'CERTEZA', cor:'#22d3ee', bg:'#0c4a6e'};
    if(prob>=0.60)return{conf:'ALTA',    cor:'#4ade80', bg:'#14532d'};
    if(prob>=0.52)return{conf:'MÉDIA',   cor:'#fbbf24', bg:'#713f12'};
    if(prob>=0.44)return{conf:'BAIXA',   cor:'#fb923c', bg:'#7c2d12'};
    return                {conf:'RISCO',  cor:'#f87171', bg:'#7f1d1d'};
  }
}

function getTiroSniper(proj,home,away){
  if(!proj)return null;
  const sH=STATS.find(t=>t.name===home),sA=STATS.find(t=>t.name===away);

  // ── TIRO 1: Resultado ──
  const opts=[{label:home,key:'home',prob:proj.win},{label:'Empate',key:'draw',prob:proj.draw},{label:away,key:'away',prob:proj.loss}];
  opts.sort((a,b)=>b.prob-a.prob);
  const t1=opts[0];
  const nv1=nivelConf(t1.prob,'res');
  // Alerta Zebra: favorito com prob < 40% (jogo muito equilibrado)
  const zebraAlerta=t1.prob<0.42;
  // Alerta Divergência: segundo mais provável está a menos de 8pp do primeiro
  const equilibrado=opts[0].prob-opts[1].prob<0.08;

  // ── TIRO 2: Asian Over/Under 2 gols ──
  const ao2=calcAsianO2(proj);
  const t2pick=ao2.over2>=ao2.under2?'Over 2':'Under 2';
  const t2prob=ao2.over2>=ao2.under2?ao2.over2:ao2.under2;
  const t2opp=ao2.over2>=ao2.under2?ao2.under2:ao2.over2;
  const nv2=nivelConf(t2prob,'gol');

  // ── TIRO 3: BTTS ──
  const t3pick=proj.btts>=0.5?'Sim':'Não';
  const t3prob=Math.max(proj.btts,1-proj.btts);
  const nv3=nivelConf(t3prob,'gol');

  return{
    t1:{pick:t1.label,key:t1.key,prob:t1.prob,conf:nv1.conf,cor:nv1.cor,bg:nv1.bg,zebra:zebraAlerta,equilibrado},
    t2:{pick:t2pick,prob:t2prob,opp:t2opp,push:ao2.push2,over2:ao2.over2,under2:ao2.under2,conf:nv2.conf,cor:nv2.cor,bg:nv2.bg},
    t3:{pick:t3pick,prob:t3prob,bttsYes:proj.btts,bttsNo:1-proj.btts,conf:nv3.conf,cor:nv3.cor,bg:nv3.bg}
  };
}

function verificarTiros(tiros,gH,gA){

  const tot=gH+gA;
  const realRes=gH>gA?'home':gH===gA?'draw':'away';
  const r1=tiros.t1.key===realRes?'ACERTO':'ERRO';
  let r2;
  if(tot>=3)r2=tiros.t2.pick==='Over 2'?'ACERTO':'ERRO';
  else if(tot===2)r2='PUSH';

  const bttsReal=gH>0&&gA>0;

function barH(pct,color){return`<div class="bar-wrap"><div class="bar-inner ${color}" style="width:${Math.min(100,pct)}%"></div></div>`;}
function sniperBadge(s){const cl=s>=75?"sb-forte":s>=55?"sb-medio":s>=40?"sb-fraco":"sb-risco";const lb=s>=75?"FORTE":s>=55?"MÉDIO":s>=40?"FRACO":"RISCO";return`<span class="sniper-badge ${cl}">${lb} ${s}</span>`;}
function pctColor(v,lo=40,hi=60){return v>=hi?"text-green":v>=lo?"text-yellow":"text-red";}
function sel(arr,val,onch){return`<select onchange="${onch}">${arr.map(t=>`<option${t===val?" selected":""}>${t}</option>`).join("")}</select>`;}
function pbarRow(lbl,val,color){const pct=(val*100).toFixed(1);return`<div class="pbar-row"><span class="pbar-label">${lbl}</span><div class="pbar-track"><div class="pbar-fill" style="width:${Math.max(4,val*100)}%;background:${color}"><span class="pbar-val">${pct}%</span></div></div></div>`;}

function criarRodada(){
  const nome=(S.pNomeNew||'').trim()||('Rodada '+(ROUNDS.length+1));
  const id=Date.now();
  RODADAS_PRX.unshift({id,nome,jogos:[],gerado:false,incorporada:false});
  salvarLS();S.pModalOpen=false;S.pNomeNew="";S.pRodadaAtual=id;render();
}
function adicionarJogo(ridx){
  RODADAS_PRX[ridx].jogos.push({home:ALL_TEAMS[0],away:ALL_TEAMS[1],gH:null,gA:null});
  salvarLS();render();
}
function removerJogo(ridx,jidx){
  RODADAS_PRX[ridx].jogos.splice(jidx,1);salvarLS();render();
}
function setJogoTime(ridx,jidx,campo,val){
  RODADAS_PRX[ridx].jogos[jidx][campo]=val;salvarLS();render();
}
function setResultado(ridx,jidx,campo,val){
  const v=(val===null||val===""||isNaN(parseInt(val)))?null:parseInt(val);
  RODADAS_PRX[ridx].jogos[jidx][campo]=v;salvarLS();render();
}
function limparResultado(ridx,jidx){
  RODADAS_PRX[ridx].jogos[jidx].gH=null;
  RODADAS_PRX[ridx].jogos[jidx].gA=null;
  salvarLS();render();
}
function gerarRelatorio(ridx){
  RODADAS_PRX[ridx].gerado=true;salvarLS();render();
}
function incorporarRodada(ridx){
  const rod=RODADAS_PRX[ridx];
  if(!rod)return;
  // Bloqueio dupla incorporação — protege integridade do banco de dados
  if(rod.incorporada){
    alert('⚠️ Esta rodada já foi incorporada à base. Não é possível incorporar duas vezes.');
    return;
  }
  const completos=rod.jogos.filter(j=>j.gH!==null&&j.gA!==null);
  if(!completos.length)return;
  // Verifica se algum jogo desta rodada já está em EXTRA_M (comparação por valor normalizado)
  const jaExiste=EXTRA_M.some(m=>normStr(m[0])===normStr(rod.nome));
  if(jaExiste){
    rod.incorporada=true;salvarLS();render();
    alert('ℹ️ Dados desta rodada já existem na base. Marcada como incorporada.');
    return;
  }
  completos.forEach(j=>{EXTRA_M.push([rod.nome,j.home,j.gH,j.gA,j.away]);});
  rod.incorporada=true;
  salvarLS();rebuildData();render();
}
function excluirRodada(ridx){
  if(!confirm('Excluir esta rodada?'))return;
  RODADAS_PRX.splice(ridx,1);
  if(S.pRodadaAtual===RODADAS_PRX[ridx]?.id)S.pRodadaAtual=null;
  salvarLS();render();
}
function limparExtras(){
  if(!confirm('Remover rodadas adicionadas? Dados base R1-R11 serão mantidos.'))return;
  EXTRA_M=[];RODADAS_PRX=[];salvarLS();rebuildData();render();
}
function deduplicarBase(){
  const antes=EXTRA_M.length;
  // 1 — Deduplica jogos em EXTRA_M pela chave rodada|mandante|visitante
  const seen=new Set();
  EXTRA_M=EXTRA_M.filter(m=>{
    const key=`${normStr(m[0])}|${normStr(m[1])}|${normStr(m[4])}`;
    if(seen.has(key))return false;
    seen.add(key);return true;
  });
  const jogosRemovidos=antes-EXTRA_M.length;

  // 2 — Deduplica RODADAS_PRX: remove abas duplicadas com o mesmo nome
  //     Mantém sempre a incorporada; se nenhuma incorporada, mantém a mais recente
  const rodMap=new Map();
  RODADAS_PRX.forEach(r=>{
    const k=normStr(r.nome);
    if(!rodMap.has(k)){rodMap.set(k,r);}
    else{
      const existing=rodMap.get(k);
      // Prefere a incorporada; se empate, mantém a com mais jogos
      if(r.incorporada&&!existing.incorporada) rodMap.set(k,r);
      else if(r.incorporada===existing.incorporada&&r.jogos.length>existing.jogos.length) rodMap.set(k,r);
    }
  });
  const rodantesQtd=RODADAS_PRX.length;
  RODADAS_PRX=[...rodMap.values()];
  const rodasRemovidas=rodantesQtd-RODADAS_PRX.length;

  // 3 — Garante que rodadas com jogos incorporados estão marcadas como incorporadas
  const rodasNaBase=new Set(EXTRA_M.map(m=>normStr(m[0])));
  RODADAS_PRX.forEach(r=>{if(rodasNaBase.has(normStr(r.nome)))r.incorporada=true;});

  salvarLS();rebuildData();render();
  const total=jogosRemovidos+rodasRemovidas;
  if(total>0){
    alert(`🔧 Limpeza concluída:\n• ${jogosRemovidos} jogo(s) duplicado(s) removidos da base\n• ${rodasRemovidas} aba(s) duplicada(s) de rodada removidas\n\nBase íntegra!`);
  } else {
    alert('✅ Nenhuma duplicata encontrada. Base já estava íntegra.');
  }
}

function runMC(){
  S.mcRun=true;render();
  setTimeout(()=>{
    const N=1200,TOTAL=38,REM=Math.max(0,TOTAL-ROUNDS.length),res={};
    STATS.forEach(t=>res[t.name]={ch:0,lib:0,sul:0,rel:0});
    for(let sim=0;sim<N;sim++){
      const pts={};STATS.forEach(t=>{pts[t.name]=t.Pts;});
      const teams=STATS.map(t=>t.name);
      for(let rr=0;rr<REM;rr++){
        const sh=[...teams].sort(()=>Math.random()-.5);
        for(let i=0;i<sh.length-1;i+=2){
          const h=sh[i],a=sh[i+1],pj=project(h,a);if(!pj)continue;
          const gH=pSample(pj.lH),gA=pSample(pj.lA);
          if(gH>gA)pts[h]+=3;else if(gH===gA){pts[h]+=1;pts[a]+=1;}else pts[a]+=3;
        }
      }
      const ranked=Object.entries(pts).sort((a,b)=>b[1]-a[1]).map(([n])=>n);
      ranked.forEach((n,i)=>{if(i===0)res[n].ch++;if(i<4)res[n].lib++;if(i<8)res[n].sul++;if(i>=ranked.length-4)res[n].rel++;});
    }
    S.mcData=STATS.map(t=>({name:t.name,Pts:t.Pts,ppg:t.P?(t.Pts/t.P).toFixed(2):"0",projPts:Math.round(t.P?t.Pts/t.P*TOTAL:0),
      ch:(res[t.name].ch/N*100).toFixed(1),lib:(res[t.name].lib/N*100).toFixed(1),sul:(res[t.name].sul/N*100).toFixed(1),rel:(res[t.name].rel/N*100).toFixed(1)
    })).sort((a,b)=>parseFloat(b.lib)-parseFloat(a.lib));
    S.mcRun=false;render();
  },80);
}

      ${rod.jogos.length>0&&!rod.gerado?`<button class="btn" onclick="gerarRelatorio(${ridx})">⚙️ Calc. Poisson</button>`:""}

    // Resumo pós-rodada
    let resumo="";
    if(rod.gerado&&todosComResult){
      let totalAc=0,totalRecs=0;
      rod.jogos.forEach(j=>{
        const p2=project(j.home,j.away);if(!p2)return;
        getTopMercados(p2,j.home,j.away).slice(0,3).forEach(m=>{
          totalRecs++;if(verificarMercado(m.nome,j.gH,j.gA))totalAc++;
        });
      });
      const pct=totalRecs?Math.round(totalAc/totalRecs*100):0;
      resumo=`<div class="card mt14" style="border-color:${pct>=60?"#16a34a":pct>=40?"#ca8a04":"#dc2626"}">

          <div class="stat-card"><div class="stat-val">${rod.jogos.length}</div><div class="stat-label">Jogos</div></div>

        </div>
      </div>`;
    }

    corpo=`${jogosHTML}${acoes}${resumo}`;
  }

  return`
  <div class="flex gap8 mb14" style="align-items:center;flex-wrap:wrap">

function normStr(s){return(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();}
function escHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function rnd(arr){return arr[Math.floor(Math.random()*arr.length)];}

// Palavras comuns do português que NÃO são nomes de time
const STOPWORDS=new Set(['que','com','uma','uns','umas','para','pois','mais','menos','pelo','pela','sobre','esse','essa','este','esta','esses','essas','estes','estas','isso','aqui','como','qual','quem','quando','onde','sera','sera','pode','tem','tem','foi','ate','ate','por','nos','nas','dos','das','sua','seu','seus','suas','meu','minha','meus','minhas','voce','dele','dela','eles','elas','esta','esse','boa','bom','mal','fim','vez','vez','vez']);

function findTeam(q){
  const nq=normStr(q);
  if(!nq||nq.length<3)return null;
  // Rejeitar stopwords comuns que nunca são nomes de time
  if(STOPWORDS.has(nq))return null;
  // Match exato
  for(const t of ALL_TEAMS){if(normStr(t)===nq)return t;}
  let best=null,bestScore=0;
  for(const t of ALL_TEAMS){
    const nt=normStr(t);
    // Substring: exige query com pelo menos 5 chars para evitar "ate"→"platense"
    if(nq.length>=5&&(nt.includes(nq)||nq.includes(nt))){
      const sc=Math.min(nq.length,nt.length)/Math.max(nq.length,nt.length);
      if(sc>bestScore){best=t;bestScore=sc;}
    }
    // Match por palavras: exige palavras com 4+ chars
    const qw=nq.split(/\s+/).filter(w=>w.length>=4);
    const tw=nt.split(/\s+/);
    if(qw.length){
      const m=qw.filter(w=>tw.some(tt=>tt===w||tt.includes(w)||w.includes(tt))).length;
      const sc2=m/Math.max(qw.length,1);
      if(sc2>0.5&&sc2>bestScore){best=t;bestScore=sc2;}
    }
  }
  return bestScore>=0.45?best:null;
}

function extractTeams(txt){
  const words=txt.split(/\s+/);const found=[];
  for(let len=4;len>=1;len--){
    for(let i=0;i<=words.length-len;i++){
      const phrase=words.slice(i,i+len).join(' ');
      const t=findTeam(phrase);
      if(t&&!found.includes(t))found.push(t);
    }
  }
  return found;
}

  }
  const totalG=ALL.reduce((s,m)=>s+m[2]+m[3],0);
  const mediaG=ALL.length?(totalG/ALL.length).toFixed(2):'0';
  const pOver=ALL.length?((ALL.filter(m=>m[2]+m[3]>2.5).length/ALL.length)*100).toFixed(0):'0';
  const pBTTS=ALL.length?((ALL.filter(m=>m[2]>0&&m[3]>0).length/ALL.length)*100).toFixed(0):'0';
  const pEmp=ALL.length?((ALL.filter(m=>m[2]===m[3]).length/ALL.length)*100).toFixed(0):'0';

  return `Você é o Sniper, analista profissional de futebol especializado na Liga Profesional Argentina 2026. Conversa em português brasileiro informal e apaixonado — opiniões próprias, debate, gírias naturais ("cara", "olha", "exatamente"), perguntas de volta. NÃO é um robô. Pensa, analisa, opina, discorda quando necessário.

## CAMPEONATO: Liga Profesional Argentina 2026 — R${rodAtual}/38

### CLASSIFICAÇÃO (${sorted.length} times):
${tabela}

### ÚLTIMOS RESULTADOS (${lastRod||'sem rodada'}):
${lastJogos}

### ESTATÍSTICAS DA LIGA (${ALL.length} jogos):
Média gols: ${mediaG} | Over 2.5: ${pOver}% | BTTS: ${pBTTS}% | Empates: ${pEmp}%

## OS 3 TIROS PADRÃO DO SNIPER
Para cada jogo da próxima rodada, o app calcula via Poisson com ajuste de Forma + H2H:
· Tiro 1 — RESULTADO (1X2): Casa / Empate / Visitante — maior probabilidade com 5 níveis de confiança
· Tiro 2 — ASIAN HANDICAP O/U 2 GOLS: Over 2 (3+ gols=ganho) · Push (=2 gols=devolução) · Under 2 (≤1 gol=ganho)
· Tiro 3 — BTTS / AMBOS MARCAM: Sim ou Não com probabilidade do modelo

## SISTEMA DE CONFIANÇA — 5 NÍVEIS (novo, recalibrado)
CERTEZA: resultado ≥70% · gols/btts ≥68% → mercado premium, entrar com força
ALTA:    resultado ≥60% · gols/btts ≥60% → boa confiança, apostar normal
MÉDIA:   resultado ≥50% · gols/btts ≥52% → cuidado, odd justa
BAIXA:   resultado ≥42% · gols/btts ≥44% → margem estreita, evitar ou apostar light
RISCO:   abaixo disso → jogo aberto, armadilha potencial

⚠️ JOGO ABERTO: quando a maior probabilidade (resultado) < 42% — equilíbrio extremo
⚡ EQUILIBRADO: quando as 2 opções mais prováveis diferem < 8pp

## MODELO POISSON — COMO FUNCIONA (para contextualizar análises)
O modelo usa: Lambda ajustado = Lambda_base × (0.65 + 0.25 × FormaMomentum + 0.10 × H2H)
FormaMomentum: últimas 5 partidas com pesos [0.08, 0.12, 0.17, 0.25, 0.38] — vitória=1.12, empate=0.95, derrota=0.82
H2H: últimos 6 confrontos diretos entre os times — max ±8% de ajuste no lambda
Resultado: previsões mais precisas que Poisson puro, especialmente para times em boa/má fase

CALIBRAÇÃO CONSERVADORA: O modelo aplica compressão automática em probabilidades extremas.
Probabilidades >65% são comprimidas (fator 0.35 acima de 65%), <12% são elevadas (piso 12%).
Isso evita overconfidence. Exemplo: modelo bruto marca 77% → calibrado vira ~69%.
Quando um jogo mostra alerta ⚠️ Overconfidence, significa que a compressão foi significativa (>8pp). SEMPRE mencione isso ao usuário.

Quando o usuário perguntar sobre palpites/apostas/picks para jogos, SEMPRE mencione os 3 tiros com as probabilidades do modelo e o nível de confiança. Se houver ⚠️ Overconfidence, alerte sobre cautela extra.

## ⚡ COMANDOS DE INSERÇÃO — OBRIGATÓRIO USAR SEMPRE
Estes comandos são interceptados pelo JavaScript do app e executados automaticamente. NÃO são "acessar sistemas externos" — são literalmente texto que o app lê e processa. Você DEVE usá-los quando o usuário fornecer dados.

Se discordar do usuário, faça com argumento sólido — não ceda sem motivo`;

async function callClaude(userMessage,imageData=null){
  if(!CLAUDE_API_KEY){
    chatAddMsg('bot','🔑 Precisamos configurar sua chave de API primeiro! Digite ela no campo abaixo:<br><br><input id="api-key-input" type="password" placeholder="sk-ant-..." style="width:100%;margin:6px 0;background:#0a0f1e;border:1px solid #334155;border-radius:7px;padding:8px;color:#f1f5f9;font-size:11px"><button onclick="saveApiKey()" style="background:linear-gradient(135deg,#0284c7,#1d4ed8);border:none;color:#fff;padding:7px 16px;border-radius:7px;cursor:pointer;font-size:11px;font-weight:700">Ativar IA 🚀</button>');
    return;
  }
  // Constrói o conteúdo da mensagem (com ou sem imagem)
  const msgContent=imageData
    ?[{type:'image',source:{type:'base64',media_type:imageData.mediaType,data:imageData.base64}},{type:'text',text:userMessage}]
    :userMessage;
  // Histórico: guarda só texto (sem base64 pesado)
  const histEntry=imageData?`[imagem: ${imageData.fileName||'arquivo'}] ${userMessage}`:userMessage;
  CLAUDE_HISTORY.push({role:'user',content:histEntry});
  if(CLAUDE_HISTORY.length>CLAUDE_MAX_TURNS) CLAUDE_HISTORY=CLAUDE_HISTORY.slice(-CLAUDE_MAX_TURNS);
  // Mensagens para a API: histórico anterior + mensagem atual com imagem
  const apiMsgs=[...CLAUDE_HISTORY.slice(0,-1),{role:'user',content:msgContent}];
  chatAddMsg('bot',imageData
    ?'<span style="color:#64748b;font-style:italic">🔍 Sniper lendo a imagem...</span>'
    :'<span style="color:#64748b;font-style:italic">✍️ Sniper analisando...</span>',true);
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':CLAUDE_API_KEY,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-opus-4-6',
        max_tokens:900,
        system:buildSystemPrompt(),
        messages:apiMsgs
      })
    });
    if(!resp.ok){
      const err=await resp.json().catch(()=>({}));
      const msg=err.error?.message||`HTTP ${resp.status}`;
      if(resp.status===401){
        CLAUDE_API_KEY=null;localStorage.removeItem('sniper_api_key');
        chatAddMsg('bot','❌ <strong>Chave de API inválida ou expirada.</strong> Configure uma nova chave abaixo:<br><br><input id="api-key-input" type="password" placeholder="sk-ant-..." style="width:100%;margin:6px 0;background:#0a0f1e;border:1px solid #334155;border-radius:7px;padding:8px;color:#f1f5f9;font-size:11px"><button onclick="saveApiKey()" style="background:linear-gradient(135deg,#0284c7,#1d4ed8);border:none;color:#fff;padding:7px 16px;border-radius:7px;cursor:pointer;font-size:11px;font-weight:700">Salvar 🔑</button>');
      } else {
        chatAddMsg('bot',`⚠️ Erro na API: ${escHtml(msg)}. Tente novamente.`);
      }
      return;
    }
    const data=await resp.json();
    const replyRaw=data.content[0].text;
    CLAUDE_HISTORY.push({role:'assistant',content:replyRaw});
    // Processa comandos embarcados
    let reply=replyRaw;
    // [[NOVA_RODADA:Nome|Time A x Time B|...]]

      RODADAS_PRX[0].gerado=true;salvarLS();render();
    }
    // [[RESULTADO:Home|gH|gA|Away]]
    const resMatches=[...replyRaw.matchAll(/\[\[RESULTADO:([^|]+)\|(\d+)\|(\d+)\|([^\]]+)\]\]/g)];
    resMatches.forEach(m=>{
      reply=reply.replace(m[0],'').trim();
      const home=findTeam(m[1].trim()),away=findTeam(m[4].trim());
      if(home&&away)cmdResultado(home,parseInt(m[2]),parseInt(m[3]),away);
    });
    reply=reply.trim();
    chatAddMsg('bot',reply.replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>'));
  }catch(e){
    chatAddMsg('bot',`⚠️ Falha na conexão: ${escHtml(e.message)}. Verifique sua internet e tente novamente.`);
  }
}

function chatProcess(txt){
  const low=normStr(txt);
  const lines=txt.split('\n').map(l=>l.trim()).filter(Boolean);
  const REG_RES=/^(.+?)\s+(\d+)\s*[-–x×vV]\s*(\d+)\s+(.+)$/i;

  // ─ AÇÕES NO APP (inserção de dados direta via texto estruturado) ─

  // Múltiplas linhas com resultados (placar)? → processarBulkResultados
  if(lines.length>1){
    const linhasComPlacar=lines.filter(l=>REG_RES.test(l));
    if(linhasComPlacar.length>=1){
      const res=processarBulkResultados(txt);
      if(res.bloqueado){chatAddMsg('bot',`🔒 <strong>Bloqueado:</strong> ${escHtml(res.motivo)}`);return;}
      let msg=`✅ <strong>${res.inseridos.length} resultado(s) inseridos em ${escHtml(res.rodNome)}:</strong><br>`+res.inseridos.map(r=>`⚽ ${r}`).join('<br>');
      if(res.naoreconhecidos.length) msg+=`<br><br>⚠️ Não reconhecidos:<br>${res.naoreconhecidos.map(escHtml).join('<br>')}`;
      msg+=`<br><br>👉 Vá em <strong>📋 Relatórios → Pós-Jogo</strong> para ver a análise completa!`;
      chatAddMsg('bot',msg);
      return;
    }
    // Sem placar → inserção de jogos (criação de rodada)
    cmdBulkInsert(lines);return;
  }

  const novaMatch=txt.match(/(?:nova\s+rodada|criar?\s+rodada)[:\s]+(.+)/i);
  if(novaMatch){cmdCriarRodadaChat(novaMatch[1].trim());return;}
  if(/^(gerar|relatorio pre|pre.jogo)/.test(low)){cmdGerar();return;}
  if(/^incorporar/.test(low)){cmdIncorporar();return;}
  // Resultado único em uma linha
  const resMatch=txt.match(/^(.+?)\s+(\d+)\s*[-–x×]\s*(\d+)\s+(.+)/i);
  if(resMatch){const t1=findTeam(resMatch[1]),t2=findTeam(resMatch[4]);if(t1&&t2){cmdResultado(t1,parseInt(resMatch[2]),parseInt(resMatch[3]),t2);return;}}
  if(lines.length>0&&/^.+:\s*$/.test(lines[0])){cmdBulkInsert(lines);return;}

  // ─ TUDO MAIS → CLAUDE IA ─
  callClaude(txt);
}

// ── Insere múltiplos resultados de uma vez ─────────────────
// Formato aceito por linha: "Time1 2-0 Time2" ou "Time1 2 x 0 Time2"
function processarBulkResultados(texto, rodNome){
  const linhas=texto.split('\n').map(l=>l.trim()).filter(Boolean);
  // Detecta nome da rodada na primeira linha (ex: "Rodada 12:" ou "Rodada 12")
  let startIdx=0;
  const primeiraLinha=linhas[0]||'';
  const nomeMatch=primeiraLinha.match(/^(rodada\s*\d+)[:\s]*$/i)||primeiraLinha.match(/^(.+?):\s*$/);
  if(nomeMatch&&!primeiraLinha.match(/\d+\s*[-x×]\s*\d+/)){
    rodNome=rodNome||nomeMatch[1].trim();
    startIdx=1;
  }
  if(!rodNome) rodNome='Rodada '+(ROUNDS.length+1);
  // Verifica se esta rodada já foi incorporada — bloqueia re-inserção
  const jaIncorporada=RODADAS_PRX.find(r=>r.incorporada&&normStr(r.nome)===normStr(rodNome));
  // Verifica se há jogos desta rodada em EXTRA_M (comparação por valor, não referência)
  const jaNoBase=EXTRA_M.some(m=>normStr(m[0])===normStr(rodNome));
  if(jaIncorporada||jaNoBase){
    return{inseridos:[],naoreconhecidos:[],rodNome,bloqueado:true,motivo:`"${rodNome}" já foi incorporada à base. Não é possível inserir novamente.`};
  }
  // Cria ou reutiliza rodada não incorporada
  let rodada=RODADAS_PRX.find(r=>!r.incorporada&&normStr(r.nome)===normStr(rodNome));
  if(!rodada){
    const id=Date.now();
    rodada={id,nome:rodNome,jogos:[],gerado:true,incorporada:false};
    RODADAS_PRX.unshift(rodada);
    S.pRodadaAtual=id;
  } else {
    S.pRodadaAtual=rodada.id;
  }
  const inseridos=[],naoreconhecidos=[];
  // Padrões: "Time 2-0 Time", "Time 2 x 0 Time", "Time 2 × 0 Time"
  const REG=/^(.+?)\s+(\d+)\s*[-–x×vV]\s*(\d+)\s+(.+)$/i;
  for(let i=startIdx;i<linhas.length;i++){
    const ln=linhas[i];
    const m=ln.match(REG);
    if(!m){naoreconhecidos.push(ln);continue;}
    const home=findTeam(m[1].trim()),away=findTeam(m[4].trim());
    const gH=parseInt(m[2]),gA=parseInt(m[3]);
    if(!home||!away||home===away){naoreconhecidos.push(ln);continue;}
    // Adiciona jogo se não existir
    let jidx=rodada.jogos.findIndex(j=>j.home===home&&j.away===away);
    let sw=false;
    if(jidx<0){jidx=rodada.jogos.findIndex(j=>j.home===away&&j.away===home);sw=true;}
    if(jidx<0){rodada.jogos.push({home,away,gH:null,gA:null});jidx=rodada.jogos.length-1;}
    rodada.jogos[jidx].gH=sw?gA:gH;
    rodada.jogos[jidx].gA=sw?gH:gA;
    inseridos.push(`${home} ${gH}–${gA} ${away}`);
  }
  rodada.gerado=true;salvarLS();render();
  return{inseridos,naoreconhecidos,rodNome};
}

function cmdBulkInsert(lines){
  let startIdx=0,rodaNome=null;
  const rodMatch=lines[0].match(/^(.+?):\s*$/)||lines[0].match(/^(rodada\s*\d+)/i);
  if(rodMatch){rodaNome=rodMatch[1].trim();startIdx=1;}
  if(rodaNome){const id=Date.now();RODADAS_PRX.unshift({id,nome:rodaNome,jogos:[],gerado:false,incorporada:false});S.pRodadaAtual=id;salvarLS();}
  if(!RODADAS_PRX.length||S.pRodadaAtual===null){chatAddMsg('bot','⚠️ Inclua o nome da rodada na primeira linha (ex: <code>Rodada 13:</code>).');return;}
  const ridx=RODADAS_PRX.findIndex(r=>r.id===S.pRodadaAtual);if(ridx<0)return;
  const rod=RODADAS_PRX[ridx];
  const added=[],notFound=[];
  for(let i=startIdx;i<lines.length;i++){
    const m=lines[i].match(/^(.+?)\s+[xXvV×]+\s+(.+)/i);if(!m)continue;
    const home=findTeam(m[1]),away=findTeam(m[2]);
    if(!home||!away||home===away){notFound.push(lines[i]);continue;}
    if(rod.jogos.find(j=>j.home===home&&j.away===away))continue;
    rod.jogos.push({home,away,gH:null,gA:null});added.push(`${home} × ${away}`);
  }
  if(added.length){rod.gerado=true;salvarLS();render();
    chatAddMsg('bot',`✅ <strong>${rodaNome?escHtml(rodaNome)+' criada':'Jogos adicionados'}!</strong> ${added.length} jogo(s):<br>${added.map(g=>`⚽ ${g}`).join('<br>')}${notFound.length?`<br>⚠️ Não reconhecidos: ${notFound.map(escHtml).join(', ')}`:''}`);
  }else{chatAddMsg('bot',`⚠️ Nenhum jogo reconhecido. Use <code>Time1 x Time2</code>.`);}
}
function cmdResultado(home,gH,gA,away){
  if(!home||!away){chatAddMsg('bot','❌ Um dos times não foi reconhecido.');return;}
  // Auto-cria rodada se não existir nenhuma selecionada
  if(S.pRodadaAtual===null||RODADAS_PRX.findIndex(r=>r.id===S.pRodadaAtual)<0){
    const id=Date.now();
    const nomeAuto='Rodada '+(ROUNDS.length+1);
    RODADAS_PRX.unshift({id,nome:nomeAuto,jogos:[],gerado:true,incorporada:false});
    S.pRodadaAtual=id;
  }
  const ridx=RODADAS_PRX.findIndex(r=>r.id===S.pRodadaAtual);
  const rod=RODADAS_PRX[ridx];
  let jidx=rod.jogos.findIndex(j=>j.home===home&&j.away===away);
  let sw=false;
  if(jidx<0){jidx=rod.jogos.findIndex(j=>j.home===away&&j.away===home);sw=true;}
  // Auto-adiciona o jogo à rodada se não estiver nela
  if(jidx<0){
    rod.jogos.push({home,away,gH:null,gA:null});
    jidx=rod.jogos.length-1;sw=false;
  }
  rod.jogos[jidx].gH=sw?gA:gH;rod.jogos[jidx].gA=sw?gH:gA;
  rod.gerado=true;
  salvarLS();render();
  const j=rod.jogos[jidx];
  const proj=project(j.home,j.away);
  const mkts=proj?getTopMercados(proj,j.home,j.away).slice(0,3):[];
  const checks=mkts.map(m=>({...m,ok:verificarMercado(m.nome,j.gH,j.gA)}));
  const nAc=checks.filter(c=>c.ok).length;
  const surp=proj&&((j.gH>j.gA&&proj.win<0.35)||(j.gA>j.gH&&proj.loss<0.35));
  let txt=`✅ <strong>${j.home} ${j.gH}–${j.gA} ${j.away}</strong>`;
  if(surp)txt+=` — surpresa! O modelo não esperava esse resultado.`;
  if(checks.length)txt+=`<br>${checks.map(c=>`${c.ok?'✅':'❌'} ${c.nome}`).join(' · ')}<br><span style="font-weight:700;color:${nAc>=2?'#4ade80':nAc===1?'#fbbf24':'#f87171'}">${nAc}/${checks.length} mercados acertados</span>`;
  chatAddMsg('bot',txt);
}

  </div>`;

  return html;
}

// BACKTEST PROGRESSIVO + CALIBRAÇÃO
// ═══════════════════════════════════════════════════════════
function runBacktest(){
  // Backtest honesto: para cada rodada R, treina com R1..R-1, testa em R
  const rodadas=[...new Set(ALL.map(m=>m[0]))];
  if(rodadas.length<4)return{error:'Mínimo 4 rodadas para backtest'};
  const results=[];
  const byConf={CERTEZA:{n:0,ok:0},ALTA:{n:0,ok:0},MÉDIA:{n:0,ok:0},BAIXA:{n:0,ok:0},RISCO:{n:0,ok:0}};
  const byConfGol={CERTEZA:{n:0,ok:0},ALTA:{n:0,ok:0},MÉDIA:{n:0,ok:0},BAIXA:{n:0,ok:0},RISCO:{n:0,ok:0}};
  const byConfBtts={CERTEZA:{n:0,ok:0},ALTA:{n:0,ok:0},MÉDIA:{n:0,ok:0},BAIXA:{n:0,ok:0},RISCO:{n:0,ok:0}};
  let totalRes=0,acertosRes=0,totalO25=0,acertosO25=0,totalBtts=0,acertosBtts=0;
  // Começar do round 4 (mínimo 3 rounds de treino)
  for(let ri=3;ri<rodadas.length;ri++){
    const rodTeste=rodadas[ri];
    const treino=ALL.filter(m=>rodadas.indexOf(m[0])<ri);
    // Rebuild PD temporário com dados de treino
    const tmpPD=buildPDtemp(treino);
    if(!tmpPD)continue;
    const jogosTeste=ALL.filter(m=>m[0]===rodTeste);
    jogosTeste.forEach(([rod,home,gH,gA,away])=>{
      if(!tmpPD.s[home]||!tmpPD.s[away])return;
      // Projeção com PD temporário
      const lH_base=Math.max(.1,tmpPD.s[home].attH*tmpPD.s[away].defA*tmpPD.avgH);
      const lA_base=Math.max(.1,tmpPD.s[away].attA*tmpPD.s[home].defH*tmpPD.avgA);
      const ffH=formFactorTemp(home,true,treino), ffA=formFactorTemp(away,false,treino);
      const h2h=h2hFactorTemp(home,away,treino);
      const lH=Math.max(.1,lH_base*(0.65+0.25*ffH+0.10*h2h.fH));
      const lA=Math.max(.1,lA_base*(0.65+0.25*ffA+0.10*h2h.fA));
      const MAX=7;
      const mx=[];for(let i=0;i<=MAX;i++){mx[i]=[];for(let j=0;j<=MAX;j++)mx[i][j]=pPMF(i,lH)*pPMF(j,lA);}
      let winR=0,drawR=0,lossR=0,o25=0,bttsV=0;
      for(let i=0;i<=MAX;i++)for(let j=0;j<=MAX;j++){
        const p=mx[i][j];
        if(i>j)winR+=p;else if(i===j)drawR+=p;else lossR+=p;
        if(i+j>2.5)o25+=p;if(i>0&&j>0)bttsV+=p;
      }
      const cal=calibrarProb(winR,drawR,lossR);
      // Resultado 1X2
      const opts=[{k:'home',p:cal.win},{k:'draw',p:cal.draw},{k:'away',p:cal.loss}];
      opts.sort((a,b)=>b.p-a.p);
      const pick=opts[0];
      const realRes=gH>gA?'home':gH===gA?'draw':'away';
      const nvRes=nivelConf(pick.p,'res');
      const acertou=pick.k===realRes;
      totalRes++;if(acertou)acertosRes++;
      byConf[nvRes.conf].n++;if(acertou)byConf[nvRes.conf].ok++;
      // Over 2.5
      const pickO25=o25>=0.5;
      const realO25=gH+gA>2.5;
      const nvO25=nivelConf(Math.max(o25,1-o25),'gol');
      totalO25++;if(pickO25===realO25)acertosO25++;
      byConfGol[nvO25.conf].n++;if(pickO25===realO25)byConfGol[nvO25.conf].ok++;
      // BTTS
      const pickBtts=bttsV>=0.5;
      const realBtts=gH>0&&gA>0;
      const nvBtts=nivelConf(Math.max(bttsV,1-bttsV),'gol');
      totalBtts++;if(pickBtts===realBtts)acertosBtts++;
      byConfBtts[nvBtts.conf].n++;if(pickBtts===realBtts)byConfBtts[nvBtts.conf].ok++;
      results.push({rod,home,away,gH,gA,pickRes:pick.k,realRes,probRes:pick.p,confRes:nvRes.conf,acertouRes:acertou,o25:o25,pickO25,realO25,acertouO25:pickO25===realO25,btts:bttsV,pickBtts,realBtts,acertouBtts:pickBtts===realBtts});
    });
  }
  return{results,byConf,byConfGol,byConfBtts,totalRes,acertosRes,totalO25,acertosO25,totalBtts,acertosBtts,rodadasTestadas:rodadas.length-3};
}

// PD temporário para backtest (sem alterar o global)
function buildPDtemp(data){
  const t={};let tH=0,tA=0,n=0;
  data.forEach(([,home,gH,gV,away])=>{
    [home,away].forEach(nm=>{if(!t[nm])t[nm]={hG:0,hGC:0,hN:0,aG:0,aGC:0,aN:0};});
    t[home].hG+=gH;t[home].hGC+=gV;t[home].hN++;
    t[away].aG+=gV;t[away].aGC+=gH;t[away].aN++;
    tH+=gH;tA+=gV;n++;
  });
  if(n<10)return null;
  const avgH=tH/n,avgA=tA/n,s={};
  Object.entries(t).forEach(([nm,v])=>{
    const hN=v.hN||1,aN=v.aN||1;
    s[nm]={attH:(v.hG/hN)/avgH,defH:(v.hGC/hN)/avgA,attA:(v.aG/aN)/avgA,defA:(v.aGC/aN)/avgH};
  });
  return{s,avgH,avgA};
}

// formFactor para backtest (usa subset de dados)
function formFactorTemp(teamName,isHome,data){
  const hist=[];
  data.forEach(([,h,gH,gA,a])=>{
    if(h===teamName)hist.push(gH>gA?'V':gH===gA?'E':'D');
    else if(a===teamName)hist.push(gA>gH?'V':gH===gA?'E':'D');
  });
  if(hist.length<3)return 1.0;
  const recentes=hist.slice(-5);
  const pesos=[0.08,0.12,0.17,0.25,0.38];
  let score=0;
  recentes.forEach((r,i)=>{
    const pw=pesos[i+(5-recentes.length)];
    if(r==='V')score+=pw*1.12;else if(r==='E')score+=pw*0.95;else score+=pw*0.82;
  });
  return Math.max(0.80,Math.min(1.20,score));
}

// h2hFactor para backtest (usa subset de dados)
function h2hFactorTemp(home,away,data){
  const matches=data.filter(m=>(m[1]===home&&m[4]===away)||(m[1]===away&&m[4]===home)).slice(-6);
  if(matches.length<2)return{fH:1.0,fA:1.0};
  let wH=0,wA=0,tot=matches.length;
  matches.forEach(m=>{
    if(m[1]===home){if(m[2]>m[3])wH++;else if(m[3]>m[2])wA++;}
    else{if(m[3]>m[2])wH++;else if(m[2]>m[3])wA++;}
  });
  const fH=1+(wH/tot-0.4)*0.20;
  const fA=1+(wA/tot-0.4)*0.20;
  return{fH:Math.max(0.90,Math.min(1.10,fH)),fA:Math.max(0.90,Math.min(1.10,fA))};
}

  if(S.tab==="forma")return renderForma();if(S.tab==="charts")return renderCharts();
  if(S.tab==="gols")return renderGols();if(S.tab==="poi")return renderPoi();
  if(S.tab==="ev")return renderEV();if(S.tab==="mc")return renderMC();
  if(S.tab==="sniper")return renderSniper();if(S.tab==="prox")return renderProxRodada();
  if(S.tab==="rel")return renderRelatorios();
  if(S.tab==="calib")return renderCalibracao();
  return"";
}
function render(){
  const lastR=ROUNDS.length?ROUNDS[ROUNDS.length-1].replace("Rodada ","R"):"R11";
  document.getElementById("app").innerHTML=`
    <div class="hdr">
      <span class="hdr-flag">🇦🇷</span>
      <div>
        <div class="hdr-title">Liga Profesional Argentina 2026</div>
        <div class="hdr-sub">Sniper Analytics v5.0 &nbsp;·&nbsp; ${STATS.length} times &nbsp;·&nbsp; ${ALL.length} jogos &nbsp;·&nbsp; R1–${lastR} &nbsp;·&nbsp; ${RODADAS_PRX.length} rodada(s) futura(s)</div>
      </div>
    </div>
    <div class="tabs">${TABS.map(t=>`<button class="tab-btn${S.tab===t.id?" active":""}" onclick="S.tab='${t.id}';render()">${t.l}</button>`).join("")}</div>
    <div class="content">${getTabContent()}</div>
    <div style="text-align:center;padding:14px;font-size:10px;color:#1e293b;border-top:1px solid #0f172a">Sniper Analytics v5.0 — Liga Profesional Argentina 2026</div>`;
}
render();
chatRender();
</script>
